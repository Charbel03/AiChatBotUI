<h2 mat-dialog-title>Reset Chat History</h2>

<mat-dialog-content>
  <p>Do you want to reset the chat history?</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close (click)="onNo()">No</button>
  <button mat-raised-button color="warn" (click)="onYes()" >Yes</button>
</mat-dialog-actions>
